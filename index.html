<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulan Inovasi Digital RBT 2026</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>

<body>
<div id="screen-ready" class="screen active">

   <center><img src="assets/logo-sekolah.png" id="logo" class="logo">

<h3 id="schoolName">SEKOLAH KEBANGSAAN LABU BESAR</h3>

<h1 id="mainTitle">BULAN INOVASI DIGITAL</h1>

<h2 id="subTitle">PANITIA REKA BENTUK DAN TEKNOLOGI</h2>

<h4 id="year">2026</h4>

<div id="statusBox" class="status-box">
    SEDIA UNTUK PELUNCURAN
</div>

</div>

</center>

<div id="screen-loading" class="screen">

    <h1>MENGESAHKAN PELANCARAN...</h1>

</div>

<div id="screen-progress" class="screen">

    <h1>🚀 Mengaktifkan Sistem</h1>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <p id="progress-text">0%</p>

</div>


<div id="screen-countdown" class="screen">

    <h1 id="countNumber">3</h1>

</div>


<div id="screen-launch" class="screen">

    <CENTER>
    <h1>🎉</h1>

    <h1>BERJAYA DILUNCURKAN</h1>

    <h2>BULAN INOVASI DIGITAL PANITIA RBT 2026</h2>

    <h2>SK LABU BESAR</h2>
    </CENTER>

</div>

<div id="screen-video" class="screen">

    <video id="launchVideo" playsinline>
    <source src="assets/launch.mp4" type="video/mp4">
</video>

</div>

<div id="flash"></div>

<audio id="beepSound" preload="auto">
    <source src="assets/beep.mp3" type="audio/mpeg">
</audio>

<audio id="whooshSound" preload="auto">
    <source src="assets/whoosh.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script type="module" src="js/firebase.js"></script>
<script src="js/script.js"></script>
</body>
</html>
